{% extends "base.html" %} {% block title %}Search - CC History Viewer{% endblock %} {% block content
%}
<div class="mb-6">
  <h1 class="text-2xl font-semibold">Search</h1>
  <p class="mt-1 text-sm text-zinc-600">
    Search parsed Claude Code messages indexed in the local SQLite cache.
  </p>
</div>

<form
  class="mb-6 grid gap-3 rounded-lg border border-zinc-200 bg-white p-4 sm:grid-cols-[1fr_12rem]"
  hx-get="/search/results"
  hx-target="#search-results"
  hx-trigger="keyup changed delay:400ms from:input, change from:select"
>
  <label class="block">
    <span class="mb-1 block text-sm font-medium text-zinc-700">Query</span>
    <input
      class="w-full rounded border border-zinc-300 px-3 py-2 text-sm"
      type="search"
      name="q"
      value="{{ q }}"
      placeholder="Search messages"
    />
  </label>
  <label class="block">
    <span class="mb-1 block text-sm font-medium text-zinc-700">User</span>
    <select class="w-full rounded border border-zinc-300 px-3 py-2 text-sm" name="user">
      <option value="">All</option>
      {% for user_name in users %}
      <option value="{{ user_name }}" {% if user == user_name %}selected{% endif %}>
        {{ user_name }}
      </option>
      {% endfor %}
    </select>
  </label>
</form>

<section id="search-results">{% include "search_results.html" %}</section>
{% endblock %}
